{% if runs %}
  <ul class="history-list">
    {% for run in runs %}
      <li>
        <a href="#" class="history-item" data-run="{{ run.run_id }}">
          <img src="{{ run.image_url }}" alt="" loading="lazy">
          <span>{{ run.display_name }}</span>
        </a>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p class="muted small">No saved runs yet.</p>
{% endif %}
