<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Satellite Insight Engine</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <h1>🛰️ Satellite Insight Engine</h1>
    <form id="search-form" autocomplete="off">
      <input type="text" id="place" name="place" placeholder="Fly to a place… (e.g. Stonehenge)">
      <button type="submit" class="secondary">Go</button>
    </form>
    <button id="snapshot" type="button" title="Analyse the current view (Enter)">📸 Snapshot</button>
  </header>

  <main>
    <section id="map-pane">
      <div id="map"></div>
      <div id="controls">
        <div class="nav-grid">
          <button data-pan="up" title="North">↑</button>
          <button data-pan="left" title="West">←</button>
          <button data-pan="right" title="East">→</button>
          <button data-pan="down" title="South">↓</button>
        </div>
        <div class="zoom">
          <button data-zoom="in" title="Zoom in">＋</button>
          <button data-zoom="out" title="Zoom out">－</button>
        </div>
        <span id="status-line" class="muted">Pan/zoom to frame a view, then press Snapshot.</span>
      </div>
    </section>

    <aside id="panel">
      <div id="loading" class="loading">Capturing… imagery → vision → enrichment</div>
      <div id="report">
        <p class="muted">Frame a location on the map and press <strong>📸 Snapshot</strong> to analyse it.</p>
      </div>
      <details id="history-wrap" open>
        <summary>Recent runs</summary>
        <div id="history" hx-get="/api/runs" hx-trigger="load, refreshRuns from:body">
          {% include "partials/history.html" %}
        </div>
      </details>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="/static/app.js" defer></script>
</body>
</html>
